<header class="lh-topbar">

    <button type="button" class="lh-sidebar-toggle d-lg-none" id="lhSidebarToggle" aria-label="Abrir menu">
        <i class="bi bi-list fs-5"></i>
    </button>

    <a href="{% url 'home' %}" class="lh-brand">
        <span class="lh-brand-mark"><i class="bi bi-crosshair"></i></span>
        Lead Hunter
    </a>

    <div class="lh-topbar-spacer"></div>

    {% if request.user.is_authenticated %}

        <div class="dropdown">

            <a href="#" class="lh-user-chip dropdown-toggle" data-bs-toggle="dropdown" aria-expanded="false">

                <span class="lh-avatar">{{ request.user.first_name|slice:":1"|upper }}{{ request.user.last_name|slice:":1"|upper }}</span>

                <span class="d-none d-sm-inline">{{ request.user.first_name|default:request.user.email }}</span>

            </a>

            <ul class="dropdown-menu dropdown-menu-end">
                <li><a class="dropdown-item" href="{% url 'profile' %}"><i class="bi bi-person me-2"></i>Meu perfil</a></li>
                <li><a class="dropdown-item" href="{% url 'empresa' %}"><i class="bi bi-building me-2"></i>Empresa</a></li>
                <li><hr class="dropdown-divider"></li>
                <li><a class="dropdown-item" href="{% url 'logout' %}"><i class="bi bi-box-arrow-right me-2"></i>Sair</a></li>
            </ul>

        </div>

    {% else %}

        <span class="text-muted small">José</span>

    {% endif %}

</header>
